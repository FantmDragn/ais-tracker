<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIS Tracking Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([0, 0], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            maxZoom: 20
        }).addTo(map);
var baseMaps = {
    "OpenStreetMap": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }),
    "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri, NASA, NGA, USGS' }),
    "Dark Mode": L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 })
};

var map = L.map('map', {
    center: [0, 0],
    zoom: 3,
    layers: [baseMaps["OpenStreetMap"]]  // Default layer
});

// Add a control to switch maps
L.control.layers(baseMaps).addTo(map);

        function updateAIS() {
            fetch('https://your-backend-url.onrender.com/ais-data')
                .then(res => res.json())
                .then(data => {
                    data.forEach(ship => {
                        L.marker([ship.lat, ship.lon]).addTo(map)
                         .bindPopup(`Ship: ${ship.mmsi}`);
                    });
                });
        }
        setInterval(updateAIS, 5000); // Refresh every 5 seconds
    </script>
</body>
</html>
